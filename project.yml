# XcodeGen project — run `xcodegen generate` after adding/removing files.
# NOTE: the .entitlements files are GENERATED from the `entitlements.properties`
# blocks below. If Xcode's automatic signing strips an App Group it can't
# provision, re-run `xcodegen generate` to restore them.
name: Clocked
options:
  bundleIdPrefix: com.osluv
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1"
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    DEVELOPMENT_TEAM: 9A74XF5B5H          # The OSLUV Project
targets:
  Clocked:
    type: application
    platform: iOS
    sources: [Clocked, Shared]
    dependencies:
      - target: ClockedWidgets
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.osluv.clocked
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: Clocked/Info.plist
      properties:
        CFBundleDisplayName: Clocked
        UILaunchScreen: {}
        NSSupportsLiveActivities: true
        NSLocationWhenInUseUsageDescription: Detects when you arrive at or leave Work to offer clock-in and clock-out prompts.
        NSLocationAlwaysAndWhenInUseUsageDescription: Background location lets Clocked prompt you to clock in when you arrive at Work and clock out after you leave.
        UIBackgroundModes: [location]
    entitlements:
      path: Clocked/Clocked.entitlements
      properties:
        com.apple.security.application-groups: [group.com.osluv.clocked]
  ClockedWidgets:
    type: app-extension
    platform: iOS
    sources: [ClockedWidgets, Shared]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.osluv.clocked.widgets
    info:
      path: ClockedWidgets/Info.plist
      properties:
        CFBundleDisplayName: Clocked
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: ClockedWidgets/ClockedWidgets.entitlements
      properties:
        com.apple.security.application-groups: [group.com.osluv.clocked]
  ClockedTests:
    type: bundle.unit-test
    platform: iOS
    sources: [ClockedTests]
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Clocked
schemes:
  Clocked:
    build:
      targets:
        Clocked: all
        ClockedTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets: [ClockedTests]
